body {
  font-family: 'Inter', sans-serif;

.dark body {

html.dark {

  overflow-x: hidden;
}

/* Smooth transitions for all elements */
* {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Global theme transition — crossfade on dark/light switch, no !important so animations still work */
.dark-transition,
.dark-transition *,
.dark-transition *::before,
.dark-transition *::after {
  transition:
    background-color 0.4s cubic-bezier(0.4,0,0.2,1),
    border-color     0.4s cubic-bezier(0.4,0,0.2,1),
    color            0.4s cubic-bezier(0.4,0,0.2,1),
    box-shadow       0.4s cubic-bezier(0.4,0,0.2,1),
    fill             0.4s cubic-bezier(0.4,0,0.2,1),
    stroke           0.4s cubic-bezier(0.4,0,0.2,1) !important;
}

/* Performance optimizations */
.animate-element {
  will-change: transform, opacity;
  transform: translate3d(0, 0, 0);
}

/* Disable animations on low-end devices */
@media (max-width: 768px) and (prefers-reduced-motion: no-preference) {
  .animate-blob {
    animation: none;
  }
}

/* Premium Scrollbar */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: #f8f9fa;
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #1a1a1a, #000000);
  border-radius: 10px;
  border: 2px solid #f8f9fa;
}

::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, #000000, #1a1a1a);
}

/* Premium Dark mode scrollbar */
.dark ::-webkit-scrollbar-track {
  background: #0a0a0a;
}

.dark ::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #ffffff, #e0e0e0);
  border-radius: 10px;
  border: 2px solid #0a0a0a;
  box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
}

.dark ::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, #e0e0e0, #ffffff);
  box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
}

@keyframes blob {
  0% { transform: translate(0px, 0px) scale(1); }
  33% { transform: translate(30px, -50px) scale(1.1); }
  66% { transform: translate(-20px, 20px) scale(0.9); }
  100% { transform: translate(0px, 0px) scale(1); }
}

  50% { transform: translateY(-20px); }

  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }

/* Premium Glass Morphism */
.glass {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(229, 231, 235, 0.8);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.05);
}

.glass-dark {
  background: rgba(10, 10, 10, 0.85);
  backdrop-filter: blur(24px) saturate(180%) brightness(1.1);
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 1px rgba(255, 255, 255, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

/* Premium Frosted glass effect */
.frosted {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(24px) brightness(1.05) saturate(120%);
  border: 1px solid rgba(255, 255, 255, 0.25);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
}

.dark .frosted {
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(28px) brightness(1.15) saturate(130%);
  border: 1px solid rgba(255, 255, 255, 0.12);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.08);
}

/* Black & White Text Styles */
.text-gradient {
  background: linear-gradient(135deg, #000000, #4a4a4a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.dark .text-gradient {
  background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 50%, #d0d0d0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.15));
}

/* Text effect for dark mode */
.neon-text {
  color: #000000;
  text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
}

.dark .neon-text {
  color: #ffffff;
  text-shadow: 0 0 30px rgba(255, 255, 255, 0.6), 0 0 60px rgba(255, 255, 255, 0.3), 0 2px 4px rgba(0, 0, 0, 0.8);
  filter: brightness(1.1);
}

/* Hover Effects */
.hover-lift {
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.hover-lift:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
}

.dark .hover-lift:hover {
  box-shadow: 0 20px 60px rgba(255, 255, 255, 0.15), 0 0 40px rgba(255, 255, 255, 0.05);
}

/* Card Hover Effects */
.card-hover {
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

.card-hover::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.05);
  transition: left 0.5s;
}

.dark .card-hover::before {
  background: rgba(255, 255, 255, 0.05);
}

.card-hover:hover::before {
  left: 100%;
}

/* Black & White Button Styles */
.btn-modern {
  background: #000000;
  border: 1px solid transparent;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  color: #ffffff;
}

.btn-modern::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
  transition: left 0.5s;
}

.btn-modern:hover {
  background: #1f1f1f;
  transform: translateY(-2px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

.btn-modern:hover::before {
  left: 100%;
}

.dark .btn-modern {
  background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
  color: #000000;
  box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.5);
}

.dark .btn-modern:hover {
  background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
  box-shadow: 0 20px 60px rgba(255, 255, 255, 0.25), 0 0 40px rgba(255, 255, 255, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.6);
  transform: translateY(-3px);
}

/* Outline button variant */
.btn-outline {
  background: transparent;
  border: 2px solid #000000;
  color: #000000;
  transition: all 0.3s ease;
}

.btn-outline:hover {
  background: #000000;
  color: white;
  transform: translateY(-1px);
}

.dark .btn-outline {
  border-color: #ffffff;
  color: #ffffff;
}

.dark .btn-outline:hover {
  background: #ffffff;
  color: #000000;
}

/* Loading Animations */
.loading-dots::after {
  content: '';
  animation: loading-dots 1.5s infinite;
}

@keyframes loading-dots {
  0%, 20% { content: '.'; }
  40% { content: '..'; }
  60%, 100% { content: '...'; }
}

/* Parallax Effect */
.parallax {
  transform-style: preserve-3d;
}

.parallax-layer {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
}

/* Custom Focus States */
.focus-visible:focus {
  outline: 2px solid #000000;
  outline-offset: 2px;
}

.dark .focus-visible:focus {
  outline: 2px solid #ffffff;
  outline-offset: 2px;
}

.responsive-padding {

/* Responsive Grid System */
.responsive-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: clamp(1rem, 3vw, 2rem);
}

.responsive-grid-sm {

}

.responsive-grid-lg {
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
}

.flex-responsive {
  display: flex;
  flex-wrap: wrap;
  gap: clamp(0.5rem, 2vw, 1rem);
}

.flex-responsive > * {
  flex: 1 1 auto;
  min-width: 0;
}

@supports (padding: max(0px)) {

  }

  }
}

/* Enhanced Print Styles */
@media print {
  .no-print {
    display: none !important;
  }
  
  * {
    background: transparent !important;
    color: black !important;
    box-shadow: none !important;
    text-shadow: none !important;
  }

  }

  }

  .print-avoid-break {
    page-break-inside: avoid;
  }

@media (prefers-reduced-motion: reduce) {
  * {

  }
}

  display: none !important;
}

.desktop .mobile-only {
  display: none !important;
}

.tablet .desktop-only,
.tablet .mobile-only {
  display: none !important;
}

/* Responsive Text Scaling */
@media (max-width: 320px) {
  html {
    font-size: 14px;
  }
}

@media (min-width: 321px) and (max-width: 375px) {
  html {
    font-size: 15px;
  }
}

@media (min-width: 376px) {
  html {
    font-size: 16px;
  }
}

/* Responsive Images */
.responsive-img {
  width: 100%;
  height: auto;
  object-fit: cover;
}

/* Responsive Videos */
.responsive-video {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  overflow: hidden;
}

.responsive-video iframe,
.responsive-video video {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* Responsive Tables */
.responsive-table {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.responsive-table table {
  min-width: 600px;
}

/* Focus Management for Mobile */
@media (max-width: 768px) {
  input:focus,
  textarea:focus,
  select:focus {
    transform: scale(1.02);
    transition: transform 0.2s ease;
  }
}

/* Prevent Zoom on Input Focus (iOS) */
@media screen and (-webkit-min-device-pixel-ratio: 0) {
  select,
  textarea,
  input[type="text"],
  input[type="password"],
  input[type="datetime"],
  input[type="datetime-local"],
  input[type="date"],
  input[type="month"],
  input[type="time"],
  input[type="week"],
  input[type="number"],
  input[type="email"],
  input[type="url"],
  input[type="search"],
  input[type="tel"],
  input[type="color"] {
    font-size: 16px;
  }
}

/* Responsive Animations */
@media (max-width: 768px) {
  .animate-on-scroll {
    animation-duration: 0.3s !important;
  }
}

/* Battery Optimization */
@media (prefers-reduced-motion: reduce) {
  .animate-blob,
  .animate-float,
  .animate-glow,
  .animate-pulse-glow {
    animation: none !important;
  }
}

/* Network-aware Loading */
@media (prefers-reduced-data: reduce) {
  .heavy-animation {
    animation: none !important;

/* CSS Custom Properties for Responsive Design */
:root {
  /* Fluid Typography Scale */
  --font-size-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --font-size-sm: clamp(0.875rem, 0.8rem + 0.375vw, 1rem);
  --font-size-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --font-size-lg: clamp(1.125rem, 1rem + 0.625vw, 1.375rem);
  --font-size-xl: clamp(1.25rem, 1.1rem + 0.75vw, 1.625rem);
  --font-size-2xl: clamp(1.5rem, 1.3rem + 1vw, 2rem);
  --font-size-3xl: clamp(1.875rem, 1.6rem + 1.375vw, 2.5rem);
  --font-size-4xl: clamp(2.25rem, 1.9rem + 1.75vw, 3rem);
  --font-size-5xl: clamp(3rem, 2.5rem + 2.5vw, 4rem);
  --font-size-6xl: clamp(3.75rem, 3rem + 3.75vw, 5rem);
  
  /* Fluid Spacing Scale */
  --spacing-xs: clamp(0.5rem, 0.4rem + 0.5vw, 1rem);
  --spacing-sm: clamp(1rem, 0.8rem + 1vw, 1.5rem);
  --spacing-md: clamp(1.5rem, 1.3rem + 1vw, 2rem);
  --spacing-lg: clamp(2rem, 1.6rem + 2vw, 3rem);
  --spacing-xl: clamp(3rem, 2.5rem + 2.5vw, 4rem);
  --spacing-2xl: clamp(4rem, 3rem + 5vw, 6rem);
  
  /* Animation Durations */
  --duration-fast: 0.15s;
  --duration-normal: 0.3s;
  --duration-slow: 0.5s;
}

/* Enhanced Fluid Typography System */
.text-fluid-xs { font-size: var(--font-size-xs); line-height: 1.4; }
.text-fluid-sm { font-size: var(--font-size-sm); line-height: 1.5; }
.text-fluid-base { font-size: var(--font-size-base); line-height: 1.6; }
.text-fluid-lg { font-size: var(--font-size-lg); line-height: 1.5; }
.text-fluid-xl { font-size: var(--font-size-xl); line-height: 1.4; }
.text-fluid-2xl { font-size: var(--font-size-2xl); line-height: 1.3; }
.text-fluid-3xl { font-size: var(--font-size-3xl); line-height: 1.2; }
.text-fluid-4xl { font-size: var(--font-size-4xl); line-height: 1.1; }
.text-fluid-5xl { font-size: var(--font-size-5xl); line-height: 1; }
.text-fluid-6xl { font-size: var(--font-size-6xl); line-height: 1; }

/* Advanced Responsive Grid System */
.responsive-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr));
  gap: var(--spacing-md);
}

.responsive-grid-sm {
  grid-template-columns: repeat(auto-fit, minmax(min(220px, 100%), 1fr));
  gap: var(--spacing-sm);
}

.responsive-grid-lg {
  grid-template-columns: repeat(auto-fit, minmax(min(350px, 100%), 1fr));
  gap: var(--spacing-lg);
}

/* Enhanced Glass Morphism */
.glass-modern {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
}

.dark .glass-modern {
  background: rgba(17, 24, 39, 0.4);
  border: 1px solid rgba(34, 211, 238, 0.2);
}

/* Advanced Animations */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translate3d(0, 30px, 0);
  }
  to {
    opacity: 1;
    transform: translate3d(0, 0, 0);
  }
}

@keyframes slideInLeft {
  from {
    opacity: 0;
    transform: translate3d(-100%, 0, 0);
  }
  to {
    opacity: 1;
    transform: translate3d(0, 0, 0);
  }
}

@keyframes scaleIn {
  from {
    opacity: 0;
    transform: scale3d(0.8, 0.8, 1);
  }
  to {
    opacity: 1;
    transform: scale3d(1, 1, 1);
  }
}

.animate-fade-in-up {
  animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
}

.animate-slide-in-left {
  animation: slideInLeft 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
}

.animate-scale-in {
  animation: scaleIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
}

/* Responsive Utilities */
.container-responsive {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 var(--spacing-md);
}

.section-padding {
  padding-top: var(--spacing-xl);
  padding-bottom: var(--spacing-xl);
}

/* Touch-Friendly Elements */
.touch-target {
  min-height: 44px;
  min-width: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Performance Optimizations */
.gpu-accelerated {
  transform: translateZ(0);
  backface-visibility: hidden;
  perspective: 1000px;
}

/* Accessibility Enhancements */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* Device-Specific Styles */
@media (max-width: 767px) {
  .mobile-stack {
    flex-direction: column;
  }
  
  .mobile-center {
    text-align: center;
  }
  
  .mobile-full {
    width: 100%;
  }
}

@media (min-width: 768px) and (max-width: 1023px) {
  .tablet-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (min-width: 1024px) {
  .desktop-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* Modern CSS Features */
.aspect-ratio-16-9 {
  aspect-ratio: 16 / 9;
}

.aspect-ratio-1-1 {
  aspect-ratio: 1 / 1;
}

.scroll-snap-x {
  scroll-snap-type: x mandatory;
}

.scroll-snap-center {
  scroll-snap-align: center;
}

/* Enhanced Focus States */
.focus-visible:focus-visible {
  outline: 2px solid #3b82f6;
  outline-offset: 2px;
  border-radius: 4px;
}

.dark .focus-visible:focus-visible {

    0 0 60px rgba(255, 255, 255, 0.15),
    inset 0 1px 0 rgba(255, 255, 255, 0.8),
    inset 0 -1px 0 rgba(0, 0, 0, 0.15);
  transform: translateY(-2px);
}

.dark .premium-button:hover::before {
  left: 100%;
}

/* Frosted Glass Panels */
.dark .frosted-panel {
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(32px) saturate(150%) brightness(1.1);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 
    0 8px 32px rgba(0, 0, 0, 0.9),
    inset 0 1px 0 rgba(255, 255, 255, 0.08),
    inset 0 -1px 0 rgba(255, 255, 255, 0.03);
}

/* Ambient Glow Effects */
.dark .ambient-glow {
  position: relative;
}

.dark .ambient-glow::after {
  content: '';
  position: absolute;
  inset: -20px;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
  z-index: -1;
}

.dark .ambient-glow:hover::after {
  opacity: 1;
}

/* Premium Dividers */
.dark .premium-divider {
  height: 1px;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(255, 255, 255, 0.15) 50%,
    transparent 100%
  );
  box-shadow: 0 1px 2px rgba(255, 255, 255, 0.05);
}

/* Luxury Input Fields */
.dark input,
.dark textarea,
.dark select {
  background: rgba(0, 0, 0, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #ffffff;
  box-shadow: 
    inset 0 2px 4px rgba(0, 0, 0, 0.5),
    0 0 0 0 rgba(255, 255, 255, 0);
  transition: all 0.3s ease;
}

.dark input:focus,
.dark textarea:focus,
.dark select:focus {
  background: rgba(0, 0, 0, 0.8);
  border-color: rgba(255, 255, 255, 0.2);
  box-shadow: 
    inset 0 2px 4px rgba(0, 0, 0, 0.6),
    0 0 0 3px rgba(255, 255, 255, 0.1),
    0 0 20px rgba(255, 255, 255, 0.15);
  outline: none;
}

/* Premium Shadows */
.dark .shadow-premium {
  box-shadow: 
    0 10px 40px rgba(0, 0, 0, 0.8),
    0 0 1px rgba(255, 255, 255, 0.1);
}

.dark .shadow-premium-lg {
  box-shadow: 
    0 20px 60px rgba(0, 0, 0, 0.9),
    0 0 40px rgba(255, 255, 255, 0.08),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

/* Animated Gradient Border */
.dark .gradient-border {
  position: relative;
  background: rgba(0, 0, 0, 0.9);
  border-radius: 12px;
}

.dark .gradient-border::before {
  content: '';
  position: absolute;
  inset: -2px;
  background: linear-gradient(
    45deg,
    rgba(255, 255, 255, 0.1),
    rgba(255, 255, 255, 0.2),
    rgba(255, 255, 255, 0.1)
  );
  border-radius: 12px;
  z-index: -1;
  animation: gradient-rotate 3s linear infinite;
}

@keyframes gradient-rotate {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

/* Luxury Hover Effects */
.dark .luxury-hover {
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.dark .luxury-hover:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 
    0 20px 60px rgba(0, 0, 0, 0.9),
    0 0 60px rgba(255, 255, 255, 0.12),
    inset 0 1px 0 rgba(255, 255, 255, 0.08);
}

/* Premium Loading Animation */
.dark .premium-loading {
  background: linear-gradient(
    90deg,
    rgba(255, 255, 255, 0.05) 0%,
    rgba(255, 255, 255, 0.15) 50%,
    rgba(255, 255, 255, 0.05) 100%
  );
  background-size: 200% 100%;
  animation: premium-shimmer 2s infinite;
}

@keyframes premium-shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* Elegant Typography */
.dark .elegant-heading {
  background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 50%, #d0d0d0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.2));
  font-weight: 700;
  letter-spacing: -0.02em;
}

/* Premium Backdrop */
.dark .premium-backdrop {
  background: rgba(0, 0, 0, 0.95);
  backdrop-filter: blur(40px) saturate(150%);
}

/* Luxury Section Backgrounds */
.dark .luxury-section {
  background: 
    radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.03) 0%, transparent 50%),
    radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.02) 0%, transparent 50%),
    linear-gradient(180deg, rgba(0, 0, 0, 1) 0%, rgba(10, 10, 10, 1) 100%);
}

/* Refined Borders */
.dark .refined-border {
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.dark .refined-border:hover {
  border-color: rgba(255, 255, 255, 0.15);
  box-shadow: 
    inset 0 1px 0 rgba(255, 255, 255, 0.08),
    0 0 20px rgba(255, 255, 255, 0.05);
}
